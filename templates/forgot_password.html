{% extends "base.html" %}

{% block title %}Forgot Password{% endblock %}

{% block content %}

<div style="max-width:420px;margin:80px auto;background:#fff;padding:30px;border-radius:14px;box-shadow:0 10px 30px rgba(0,0,0,0.08);">

    <h2 style="margin-bottom:10px;">Forgot Password</h2>
    <p style="color:#6b7280;margin-bottom:20px;">
        Enter your email and we’ll send you a reset link.
    </p>

    {% if message %}
        <div style="padding:10px;background:#ecfdf5;border:1px solid #10b981;color:#065f46;border-radius:8px;margin-bottom:15px;">
            {{ message }}
        </div>
    {% endif %}

    <form method="POST">

        <label>Email</label>
        <input type="email" name="email" required
               style="width:100%;padding:10px;margin:8px 0 16px;border:1px solid #d1d5db;border-radius:8px;">

        <button type="submit"
                style="width:100%;padding:12px;background:#F07154;border:none;color:#19123A;font-weight:600;border-radius:10px;cursor:pointer;">
            Send Reset Link
        </button>

    </form>

    <p style="margin-top:15px;font-size:14px;">
        Remember your password?
        <a href="{{ url_for('login') }}" style="color:#045174;">Login</a>
    </p>

</div>

{% endblock %}
