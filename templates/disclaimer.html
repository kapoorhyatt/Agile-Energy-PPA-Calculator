<!DOCTYPE html>
<html>
<head>
    <title>Disclaimer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f5f5f5;
            height: 100vh;
            position: relative; /* for logo positioning */
        }

        /* Logo styling */
        .logo {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 200px;
            height: auto;
        }

        /* Centered container */
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%; /* fills the viewport vertically */
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        h1 {
            font-size: 36px;
            margin-bottom: 20px;
            color: #333;
        }

        p {
            font-size: 18px;
            margin-bottom: 30px;
            color: #555;
            max-width: 600px;
        }

        button {
            padding: 12px 25px;
            font-size: 16px;
            cursor: pointer;
            background-color: #007bff;
            color: #fff;
            border: none;
            border-radius: 5px;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #0056b3;
        }

        @media (max-width: 600px) {
            .logo {
                width: 140px;
            }
            p {
                font-size: 16px;
            }
            h1 {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <!-- Logo -->
    <img src="{{ url_for('static', filename='images/Agile Logo.png') }}" alt="Agile Logo" class="logo">

    <div class="container">
        <h1>Disclaimer</h1>
        <p>xxxxxxx</p>

        <form method="POST" action="/disclaimer">
            <button type="submit">Accept and Continue</button>
        </form>
    </div>
</body>
</html>
