<!DOCTYPE html>
<html>
<head>
    <title>PPA Rates</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f4f5f7;
            margin: 0;
            padding: 40px;
        }

        .page {
            max-width: 700px;
            margin: auto;
            text-align: center;
        }

        .logo {
            width: 180px;
            margin-bottom: 20px;
        }

        .results-container {
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.08);
        }

        h2 {
            margin-bottom: 20px;
            color: #1f2937;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid #d1d5db;
            padding: 12px;
        }

        th {
            background-color: #f3f4f6;
        }

        tr:nth-child(even) {
            background-color: #fafafa;
        }

        .btn {
            margin-top: 25px;
            background: linear-gradient(90deg, #045174, #F07154);
            color: white;
            padding: 12px 26px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }

        .btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }
    </style>
</head>

<body>

<div class="page">

    <img src="{{ url_for('static', filename='images/Agile Logo.png') }}" class="logo">

    <div class="results-container">
        <h2>PPA Rates</h2>

        <table>
            <tr>
                <th>Term Length</th>
                <th>PPA Price (c/kWh)</th>
            </tr>

            {% for rate in rates.rates %}
            <tr>
                <td>{{ rate.term }}</td>
                <td>{{ rate.ppa_rate | round(2) }}</td>
            </tr>
            {% endfor %}
        </table>

        <a href="{{ url_for('download_ppa_pdf') }}">
            <button class="btn">Download One-Page Summary</button>
        </a>
    </div>

</div>

</body>
</html>
